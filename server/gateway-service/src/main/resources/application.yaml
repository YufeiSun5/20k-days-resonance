server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      routes:
        - id: core-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/core/**
        - id: profile-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/profile/**

management:
  endpoints:
    web:
      exposure:
        include: health,info
