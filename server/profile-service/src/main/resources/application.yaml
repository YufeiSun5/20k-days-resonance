server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: profile-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/resonance_profile}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}

management:
  endpoints:
    web:
      exposure:
        include: health,info

wechat:
  miniapp:
    app-id: ${WECHAT_MINIAPP_APP_ID:}
    app-secret: ${WECHAT_MINIAPP_APP_SECRET:}
    session-url: ${WECHAT_MINIAPP_SESSION_URL:https://api.weixin.qq.com/sns/jscode2session}
