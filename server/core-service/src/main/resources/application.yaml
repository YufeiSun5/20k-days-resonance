server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: core-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/resonance_core}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    baseline-on-migrate: true
    baseline-version: 1
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

ai:
  skills-root: ${AI_SKILLS_ROOT:../../data/skills}
  max-history-messages: ${AI_MAX_HISTORY_MESSAGES:20}
  max-concurrent-per-user: ${AI_MAX_CONCURRENT_PER_USER:2}
  agent:
    max-rounds: ${AI_AGENT_MAX_ROUNDS:3}
    max-requests-per-round: ${AI_AGENT_MAX_REQUESTS_PER_ROUND:4}
    no-new-context-limit: ${AI_AGENT_NO_NEW_CONTEXT_LIMIT:2}
    context-char-budget: ${AI_AGENT_CONTEXT_CHAR_BUDGET:90000}
  deepseek:
    api-key: ${DEEPSEEK_API_KEY:}
    base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
    model: ${DEEPSEEK_MODEL:deepseek-v4-flash}

management:
  endpoints:
    web:
      exposure:
        include: health,info
